events { worker_connections 2048; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 10m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  upstream auth        { server auth:3001;         keepalive 4; }
  upstream tours       { server tours:3002;        keepalive 8; }
  upstream flights     { server flights:3003;      keepalive 4; }
  upstream hotels      { server hotels:3004;       keepalive 4; }
  upstream orders      { server orders:3005;       keepalive 4; }
  upstream reviews     { server reviews:3006;      keepalive 4; }
  upstream notifications { server notifications:3007; keepalive 2; }

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    server_name ${DOMAIN} www.${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://auth/;
    }

    location /api/tours/         { limit_req zone=api burst=50 nodelay; proxy_pass http://tours/; }
    location /api/destinations/  { limit_req zone=api burst=50 nodelay; proxy_pass http://tours/destinations/; }
    location /api/flights/       { limit_req zone=api burst=30 nodelay; proxy_pass http://flights/; }
    location /api/hotels/        { limit_req zone=api burst=30 nodelay; proxy_pass http://hotels/; }
    location /api/orders/        { limit_req zone=api burst=20 nodelay; proxy_pass http://orders/orders/; }
    location /api/favorites/     { limit_req zone=api burst=20 nodelay; proxy_pass http://orders/favorites/; }
    location /api/reviews/       { limit_req zone=api burst=20 nodelay; proxy_pass http://reviews/; }
    location /api/notifications/ { limit_req zone=api burst=10 nodelay; proxy_pass http://notifications/; }

    location /health { return 200 "ok\n"; add_header Content-Type text/plain; }

    # SPA
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public, no-transform";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
      root /usr/share/nginx/html;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
