events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

  upstream auth        { server auth:3001; }
  upstream tours       { server tours:3002; }
  upstream flights     { server flights:3003; }
  upstream hotels      { server hotels:3004; }
  upstream orders      { server orders:3005; }
  upstream reviews     { server reviews:3006; }
  upstream notifications { server notifications:3007; }

  server {
    listen 80;
    server_name _;

    # API routing
    location /api/auth/          { proxy_pass http://auth/;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/tours/         { proxy_pass http://tours/;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/destinations/  { proxy_pass http://tours/destinations/; proxy_set_header Host $host; }
    location /api/flights/       { proxy_pass http://flights/;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/hotels/        { proxy_pass http://hotels/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/orders/        { proxy_pass http://orders/orders/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/favorites/     { proxy_pass http://orders/favorites/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/reviews/       { proxy_pass http://reviews/;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/notifications/ { proxy_pass http://notifications/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # Health check
    location /health { return 200 "ok\n"; add_header Content-Type text/plain; }

    # SPA fallback — frontend static files
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}
